version: '3.8'

services:
  # MySQL 基础设施组件
  mysql-reserve:
    image: mysql:8.0
    container_name: mysql-reserve
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      # 【核心】：将本地的 sql 脚本映射到容器的自动初始化目录
      - ./deploy/mysql-init:/docker-entrypoint-initdb.d
      # 数据持久化，防止容器删了数据跟着消失
      - mysql_data:/var/lib/mysql
    restart: always
    command: --default-authentication-plugin=mysql_native_password

  # Redis 基础设施组件
  redis-reserve:
    image: redis:7-alpine
    container_name: redis-reserve
    ports:
      - "6379:6379"
    volumes:
      # 数据持久化
      - redis_data:/data
    restart: always

  # 坚守官方 apache/kafka 镜像
  kafka-reserve:
    image: apache/kafka:3.7.0
    container_name: kafka-reserve
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      # 【彻底纠正】：控制官通道独立走 9093 端口
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
      # 【彻底纠正】：双通道划分。INTERNAL 走 9094，EXTERNAL 走 9092，CONTROLLER 独立走 9093！三个端口完全错开！
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:9094,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka-reserve:9094,EXTERNAL://127.0.0.1:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
    volumes:
      # 【核心避坑】：改用 Docker 全权管理的普通命名卷，不再映射宿主机本地相对路径，100% 避免权限闪退问题
      - kafka_data:/var/lib/kafka/data
    restart: always

  # 影子初始化容器
  kafka-init:
    image: apache/kafka:3.7.0
    container_name: kafka-init
    depends_on:
      - kafka-reserve
    entrypoint: [ "sh", "-c" ]
    command:
      - |
        echo "⏳ 正在等待 Kafka 集群就绪..."
        sleep 5
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-reserve:9094 --list
        
        echo "🚀 正在自动创建核心业务 Topic..."
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-reserve:9094 --create --if-not-exists --topic appointment-orders --partitions 3 --replication-factor 1
        
        echo "🌟 Topic 创建成功，初始化容器功成身退！"  # 追加到 docker-compose.yaml 的 services 节点下

  k6-stress:
    image: grafana/k6:latest
    container_name: k6-stress
    volumes:
      - ./stress-test.js:/stress-test.js
    # 注意：在容器网络内，网关地址需要调整为容器名，例如 http://api-reserve:8888
    command: run /stress-test.js
    network_mode: "host" # 使用 host 网络可以直接用 localhost 压测宿主机暴露的端口
    depends_on:
      - kafka-reserve


# 声明命名数据卷
volumes:
  mysql_data:
  redis_data:
  kafka_data: