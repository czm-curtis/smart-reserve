syntax = "proto3";

package appointmentclient;
option go_package = "./appointmentclient";

// 抢号预约请求
message CreateAppointmentReq {
  int64 userId = 1;
  int64 scheduleId = 2;
}

// 抢号预约响应
message CreateAppointmentResp {
  int32 code = 1;
  string msg = 2;
  string orderNo = 3;
}

// 定义核心预约 RPC 服务
service Appointment {
  rpc CreateAppointment(CreateAppointmentReq) returns (CreateAppointmentResp);
}